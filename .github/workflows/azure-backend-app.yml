# Publishes backend/backend.csproj and deploys the output to Azure App Service.
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_WEBAPP_NAME          e.g. snippet-manager-api
#   AZURE_WEBAPP_PUBLISH_PROFILE  contents of the downloaded *.PublishSettings file
#
# Publish profile: Azure Portal → your Web App → Download publish profile (top bar / Overview).

name: Deploy backend to Azure Web App

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-app.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish backend/backend.csproj -c Release -o "${{ runner.temp }}/publish" --no-self-contained

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/publish
