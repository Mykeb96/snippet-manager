# Publishes backend/backend.csproj and deploys the output to Azure App Service.
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_WEBAPP_NAME          e.g. snippet-manager-api
#   AZURE_WEBAPP_PUBLISH_PROFILE  contents of the downloaded *.PublishSettings file
#
# Publish profile: Azure Portal → your Web App → Download publish profile (top bar / Overview).

name: Deploy backend to Azure Web App

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-app.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # webapps-deploy only uses the publish profile. If this step fails, the
      # deploy action falls through to "Azure login" and shows a misleading error.
      - name: Validate Azure secrets
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            echo "::error::Secret AZURE_WEBAPP_NAME is empty. Add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "::error::Secret AZURE_WEBAPP_PUBLISH_PROFILE is empty. Paste the entire .PublishSettings XML (after enabling SCM basic auth in App Service → Configuration → General settings)."
            exit 1
          fi
          case "$AZURE_WEBAPP_PUBLISH_PROFILE" in *publishData*)
            ;;
          *)
            echo "::error::AZURE_WEBAPP_PUBLISH_PROFILE does not look like publish profile XML (expected publishData). Re-download from Azure → Overview → Download publish profile."
            exit 1
            ;;
          esac

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish backend/backend.csproj -c Release -o "${{ runner.temp }}/publish" --no-self-contained

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/publish
